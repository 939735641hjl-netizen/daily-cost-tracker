<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>日均费用追踪器</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header class="header">
      <h1>日均费用追踪器</h1>
      <p class="subtitle">记录每日支出，掌握消费趋势</p>
    </header>

    <section class="summary-cards">
      <div class="card">
        <div class="card-label">今日支出</div>
        <div class="card-value" id="todayTotal">¥0.00</div>
      </div>
      <div class="card">
        <div class="card-label">本月日均</div>
        <div class="card-value" id="monthlyAvg">¥0.00</div>
      </div>
      <div class="card">
        <div class="card-label">本月总计</div>
        <div class="card-value" id="monthTotal">¥0.00</div>
      </div>
      <div class="card">
        <div class="card-label">记录天数</div>
        <div class="card-value" id="recordDays">0 天</div>
      </div>
    </section>

    <section class="add-expense">
      <h2>添加支出</h2>
      <form id="expenseForm">
        <div class="form-row">
          <div class="form-group">
            <label for="expDate">日期</label>
            <input type="date" id="expDate" required />
          </div>
          <div class="form-group">
            <label for="expAmount">金额（元）</label>
            <input type="number" id="expAmount" placeholder="0.00" step="0.01" min="0.01" required />
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="expCategory">分类</label>
            <select id="expCategory">
              <option value="餐饮">🍜 餐饮</option>
              <option value="交通">🚇 交通</option>
              <option value="购物">🛍️ 购物</option>
              <option value="娱乐">🎮 娱乐</option>
              <option value="医疗">💊 医疗</option>
              <option value="居家">🏠 居家</option>
              <option value="教育">📚 教育</option>
              <option value="其他">📦 其他</option>
            </select>
          </div>
          <div class="form-group">
            <label for="expNote">备注</label>
            <input type="text" id="expNote" placeholder="可选" maxlength="50" />
          </div>
        </div>
        <button type="submit" class="btn-add">添加记录</button>
      </form>
    </section>

    <section class="expense-list">
      <div class="list-header">
        <h2>支出明细</h2>
        <div class="filter-bar">
          <select id="filterMonth">
            <option value="">全部月份</option>
          </select>
          <select id="filterCategory">
            <option value="">全部分类</option>
            <option value="餐饮">餐饮</option>
            <option value="交通">交通</option>
            <option value="购物">购物</option>
            <option value="娱乐">娱乐</option>
            <option value="医疗">医疗</option>
            <option value="居家">居家</option>
            <option value="教育">教育</option>
            <option value="其他">其他</option>
          </select>
          <button class="btn-clear" id="clearAllBtn">清空全部</button>
        </div>
      </div>
      <div id="expenseItems" class="expense-items">
        <div class="empty-hint">暂无支出记录，添加第一条吧！</div>
      </div>
    </section>

    <section class="category-breakdown">
      <h2>分类汇总（本月）</h2>
      <div id="categoryBreakdown" class="breakdown-list"></div>
    </section>
  </div>

  <script src="app.js"></script>
</body>
</html>
